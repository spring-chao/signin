<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>盛和塾签到</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:#fff}
.container{max-width:420px;margin:0 auto;padding:20px}
.header{text-align:center;padding:20px 0 16px}
.header .brand{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:2px;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .motto{font-size:12px;color:#64748b;letter-spacing:3px}
.header .icon-line{font-size:36px;margin:12px 0 6px}
.header h1{font-size:18px;font-weight:600;margin-bottom:4px}
.active-events{display:none;margin-top:12px;padding:10px 12px;border-radius:10px;background:rgba(59,130,246,.1);color:#bfdbfe;font-size:13px;line-height:1.8;text-align:left}
.active-events.show{display:block}
.card{background:rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08)}
.card h3{font-size:15px;margin-bottom:16px;color:#e2e8f0}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.input-group input{width:100%;padding:14px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:16px;outline:none}
.input-group input:focus{border-color:#3b82f6;background:rgba(255,255,255,.1)}
.btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;letter-spacing:1px}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;pointer-events:none}
.multi-panel{display:none;margin-top:14px;padding:14px;border-radius:10px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25)}
.multi-panel.show{display:block}
.multi-panel .tip{font-size:14px;line-height:1.6;color:#bfdbfe;margin-bottom:10px}
.multi-panel select{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:#16213e;color:#fff;font-size:16px;margin-bottom:10px}
.multi-panel .btn{padding:12px;font-size:15px}
.msg{margin-top:14px;padding:14px 16px;border-radius:10px;font-size:14px;text-align:center;display:none}
.msg.show{display:block}
.msg.success{background:rgba(34,197,94,.15);color:#4ade80}
.msg.error{background:rgba(239,68,68,.15);color:#f87171}
.result-card{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:14px;padding:24px 20px;text-align:center;display:none}
.result-card.show{display:block}
.result-card .check-icon{font-size:56px;margin-bottom:8px}
.result-card .welcome{font-size:20px;font-weight:700;margin-bottom:12px;color:#4ade80}
.result-card .seat-item{font-size:22px;font-weight:700;color:#fbbf24;margin:6px 0;padding:10px 16px;background:rgba(251,191,36,.1);border-radius:10px;display:inline-block}
.result-card .seat-item:empty{display:none}
.result-card .info{font-size:13px;color:#94a3b8;line-height:1.6;margin-top:8px}
.loading{text-align:center;padding:60px 20px;color:#64748b}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid rgba(255,255,255,.1);border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:10px;font-size:11px;color:#475569}
.footer a{color:#64748b}
</style>
</head>
<body>
<div class="container">
  <div id="loadingArea" class="loading"><div class="spinner"></div><div>加载中...</div></div>
  <div id="mainArea" style="display:none">
    <div class="header">
      <div class="brand">盛和塾</div>
      <div class="motto">提高心性 拓展经营</div>
      <div class="icon-line">&#x1f4cb;</div>
      <h1 id="eventName"></h1>
      <div class="active-events" id="activeEvents"></div>
    </div>
    <div class="card" id="formCard">
      <h3>&#x270d;&#xfe0f; 签到</h3>
      <div class="input-group"><label>姓名</label><input type="text" id="nameInput" placeholder="请输入报名时的姓名"></div>
      <div class="input-group"><label>手机号</label><input type="tel" id="phoneInput" placeholder="请输入11位手机号" maxlength="11"></div>
      <button class="btn" id="submitBtn" onclick="doCheckin()">&#x2713; 确认签到</button>
      <div class="multi-panel" id="eventPanel">
        <div class="tip">您报名了多个开放活动，请选择本次签到活动：</div>
        <select id="eventSelect"></select>
        <button class="btn" id="eventBtn" onclick="confirmEventCheckin()">确认活动</button>
      </div>
      <div class="multi-panel" id="multiPanel">
        <div class="tip" id="multiText"></div>
        <select id="quantitySelect"></select>
        <button class="btn" id="multiBtn" onclick="confirmMultiCheckin()">确认本次到场人数</button>
      </div>
      <div class="msg" id="msgBox"></div>
    </div>
    <div class="result-card" id="resultCard">
      <div class="check-icon">&#x2705;</div>
      <div class="welcome" id="welcomeText"></div>
      <div id="seatArea"></div>
      <div class="info" id="resultInfo"></div>
    </div>
    <div class="footer"><a href="/admin.html">&#x1f512; 管理后台</a></div>
  </div>
</div>
<script>
var API="https://shengheshu-d2g2zyyl99f6c6fc2-1453587887.ap-shanghai.app.tcloudbase.com/api";
var pendingName="",pendingPhone="",pendingEventId="";

async function init(){
  try{
    var r=await fetch(API+"/event");var d=await r.json();
    document.getElementById("eventName").textContent=d.event_name||"盛和塾签到";
    var activeEvents=d.active_events||[],displayEvents=d.display_events||activeEvents,eventsBox=document.getElementById("activeEvents");
    if(displayEvents.length>1){eventsBox.innerHTML='<strong>当前活动：</strong><br>'+displayEvents.map(function(item){var state=item.checkin_status==="upcoming"?'（未开始）':'';return '• '+esc(item.event_date+' · '+item.activity_type_name+' · '+item.name+state)}).join('<br>');eventsBox.classList.add('show')}
    else if(displayEvents.length===1 && displayEvents[0].checkin_status==="upcoming"){var start=new Date(displayEvents[0].checkin_start_at);eventsBox.innerHTML='<strong>活动尚未开始签到</strong><br>签到将于 '+esc(start.toLocaleString('zh-CN',{timeZone:'Asia/Shanghai',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}))+' 开始';eventsBox.classList.add('show')}
    else eventsBox.classList.remove('show');
    if(Number(d.active_event_count||0)===0){document.getElementById("submitBtn").disabled=true;document.getElementById("submitBtn").textContent=displayEvents.length?"尚未到签到时间":"当前暂无开放签到的活动";document.getElementById("nameInput").disabled=true;document.getElementById("phoneInput").disabled=true;}
    document.getElementById("loadingArea").style.display="none";
    document.getElementById("mainArea").style.display="block";
  }catch(e){document.getElementById("loadingArea").innerHTML='<div style="color:#f87171">⚠️ 加载失败</div><div style="font-size:12px">请刷新重试</div>'}
}

function m(t,ty){var e=document.getElementById("msgBox");e.textContent=t;e.className="msg show "+ty;setTimeout(function(){e.classList.remove("show")},3000)}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(ch){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]})}

async function doCheckin(){
  var name=document.getElementById("nameInput").value.trim();
  var phone=document.getElementById("phoneInput").value.trim().replace(/\s/g,"").replace(/-/g,"");
  if(!name||!phone){m("请输入姓名和手机号","error");return}
  if(phone.length!==11||!/^\d+$/.test(phone)){m("请输入正确的11位手机号","error");return}
  pendingName=name;pendingPhone=phone;
  pendingEventId="";
  document.getElementById("eventPanel").classList.remove("show");
  document.getElementById("multiPanel").classList.remove("show");
  await submitCheckin(null);
}

async function confirmMultiCheckin(){
  var quantity=parseInt(document.getElementById("quantitySelect").value,10);
  if(!quantity){m("请选择本次到场人数","error");return}
  await submitCheckin(quantity);
}

async function confirmEventCheckin(){
  pendingEventId=document.getElementById("eventSelect").value;
  if(!pendingEventId){m("请选择本次签到活动","error");return}
  document.getElementById("eventPanel").classList.remove("show");
  await submitCheckin(null);
}

async function submitCheckin(quantity){
  var btn=quantity?document.getElementById("multiBtn"):(pendingEventId?document.getElementById("eventBtn"):document.getElementById("submitBtn"));
  var originalText=btn.textContent;
  btn.disabled=true;btn.textContent=quantity?"签到中...":"验证中...";
  try{
    var payload={name:encodeURIComponent(pendingName),phone:pendingPhone,_e:1};
    if(pendingEventId)payload.event_id=pendingEventId;
    if(quantity)payload.quantity=quantity;
    var r=await fetch(API+"/checkin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    var d=await r.json();
    if(d.needs_event){
      var eventSelect=document.getElementById("eventSelect");eventSelect.innerHTML="";
      (d.events||[]).forEach(function(item){var option=document.createElement("option");option.value=item.event_id;option.textContent=item.event_date+" · "+item.activity_type_name+" · "+item.name;eventSelect.appendChild(option)});
      document.getElementById("eventPanel").classList.add("show");
      m(d.msg||"请选择活动","success");
    }else if(d.needs_quantity){
      var info=d.data||{},remaining=Number(info.remaining_slots||0);
      document.getElementById("multiText").textContent="该姓名共报名 "+info.total_slots+" 人，已签到 "+info.checked_slots+" 人。请选择本次实际到场人数：";
      var select=document.getElementById("quantitySelect");select.innerHTML="";
      for(var i=1;i<=remaining;i++){var option=document.createElement("option");option.value=i;option.textContent=i+" 人";select.appendChild(option)}
      document.getElementById("multiPanel").classList.add("show");
      m(d.msg||"请选择到场人数","success");
    }else if(d.ok){
      document.getElementById("formCard").style.display="none";
      document.getElementById("multiPanel").classList.remove("show");
      document.getElementById("eventPanel").classList.remove("show");
      document.getElementById("resultCard").classList.add("show");
      document.getElementById("welcomeText").textContent="欢迎 "+d.data.name+"学长！";
      var shGrp=d.data.show_group!=="false",shDin=d.data.show_dinner_table!=="false";
      var seatHtml="";
      if(shGrp && d.data.group_num) seatHtml+='<div class="seat-item">大会现场：第 '+d.data.group_num+' 组</div>';
      if(shDin && d.data.dinner_table_num) seatHtml+='<div class="seat-item">空巴晚宴：第 '+d.data.dinner_table_num+' 桌</div>';
      document.getElementById("seatArea").innerHTML=seatHtml;
      var info="";
      if(d.data.event) info+="活动："+esc(d.data.event.event_date+" · "+d.data.event.activity_type_name+" · "+d.data.event.name)+"<br>";
      if(d.data.group_value) info+=esc(d.data.group_type||"分组")+"："+esc(d.data.group_value)+"<br>";
      else if(d.data.class_name) info+="班级："+esc(d.data.class_name)+"<br>";
      else if(d.data.center) info+="分中心："+esc(d.data.center)+"<br>";
      else if(d.data.group_name) info+="小组："+esc(d.data.group_name)+"<br>";
      if(d.data.company) info+="公司："+esc(d.data.company);
      if(d.data.multi_total>1) info+=(info?"<br>":"")+"多人报名：已签到 "+d.data.multi_checked+"/"+d.data.multi_total+" 人"+(d.checked_count?"（本次 "+d.checked_count+" 人）":"");
      if(d.already) info=(info?info+"<br>":"")+"（已签到 · "+new Date(d.data.checked_at).toLocaleString("zh-CN")+"）";
      document.getElementById("resultInfo").innerHTML=info||"签到成功";
    }
    else{m(d.msg,"error");document.getElementById("formCard").style.display="block";}
  }catch(e){m("网络错误","error");document.getElementById("formCard").style.display="block";}
  btn.disabled=false;btn.textContent=originalText;
}
init();
</script>
</body>
</html>
