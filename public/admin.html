<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理后台 - 盛和塾签到</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:16px}
.header{text-align:center;padding:20px 0}
.header h1{font-size:18px;margin-bottom:4px}
.header .sub{font-size:12px;color:#64748b}
.login-card{background:rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08);text-align:center}
.login-card input{width:100%;padding:14px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:16px;outline:none;margin-bottom:12px;text-align:center}
.login-card input:focus{border-color:#3b82f6}
.overview{display:flex;gap:10px;margin-bottom:16px}
.ov-item{flex:1;text-align:center;background:rgba(255,255,255,.05);border-radius:12px;padding:16px 8px}
.ov-item .num{font-size:32px;font-weight:800}
.ov-item .num.green{color:#4ade80}.ov-item .num.blue{color:#60a5fa}.ov-item .num.yellow{color:#fbbf24}
.ov-item .label{font-size:11px;color:#64748b;margin-top:4px}
.section{margin-bottom:16px}
.section h3{font-size:14px;margin-bottom:10px;color:#94a3b8}
.form-field{margin-bottom:12px}
.form-field label{display:block;margin-bottom:6px;color:#cbd5e1;font-size:13px}
.form-field label span{color:#64748b;font-size:11px;font-weight:400}
.form-field input{width:100%;padding:11px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#fff;font-size:14px;outline:none}
.form-field input:focus{border-color:#3b82f6}
.form-field input::placeholder{color:#475569}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 10px}
.form-help{font-size:11px;color:#64748b;line-height:1.6;margin:-2px 0 12px}
.upload-area{border:2px dashed rgba(255,255,255,.15);border-radius:12px;padding:20px;text-align:center;margin-bottom:12px;cursor:pointer}
.upload-area:hover{border-color:#3b82f6;background:rgba(59,130,246,.05)}
.upload-area .icon{font-size:32px;margin-bottom:6px}
.upload-area .text{font-size:13px;color:#94a3b8}
.upload-area .hint{font-size:11px;color:#475569;margin-top:4px}
.upload-preview{display:none;margin:0 0 12px;padding:14px;border-radius:12px;background:rgba(15,23,42,.72);border:1px solid rgba(96,165,250,.28)}
.upload-preview.show{display:block}
.upload-preview .preview-title{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:10px}
.preview-summary{margin-bottom:10px;padding:11px;border-radius:9px;background:rgba(59,130,246,.14);color:#bfdbfe;text-align:center;font-size:14px}
.preview-summary strong{display:inline-block;margin:0 3px;color:#fff;font-size:24px;vertical-align:-2px}
.preview-events{font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:10px;word-break:break-all}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.preview-item{background:rgba(255,255,255,.05);border-radius:8px;padding:9px 6px;text-align:center}
.preview-item .value{font-size:20px;font-weight:800;color:#e2e8f0}
.preview-item .caption{font-size:11px;color:#64748b;margin-top:2px}
.preview-item.add .value{color:#4ade80}.preview-item.remove .value{color:#f87171}.preview-item.repeat .value{color:#fbbf24}
.preview-warning{margin-top:10px;padding:9px 10px;border-radius:8px;background:rgba(239,68,68,.12);color:#fca5a5;font-size:12px;line-height:1.5}
.btn{padding:10px 24px;border-radius:10px;font-size:14px;cursor:pointer;border:none;font-weight:600;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.btn.success{background:rgba(34,197,94,.25);color:#4ade80}
.btn.danger{background:rgba(239,68,68,.2);color:#f87171}
.btn.full{width:100%;padding:14px;font-size:16px}
.btn-group{display:flex;gap:8px;margin-top:12px}
.btn-group .btn{flex:1;text-align:center}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.msg.show{display:block}
.msg.success{background:rgba(34,197,94,.15);color:#4ade80}
.msg.error{background:rgba(239,68,68,.15);color:#f87171}
.msg.info{background:rgba(59,130,246,.15);color:#60a5fa}
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;background:rgba(255,255,255,.05);color:#94a3b8;border:none;transition:all .2s}
.tab.active{background:#3b82f6;color:#fff}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.list-item .li-name{font-weight:500}
.list-item .li-meta{color:#64748b;font-size:11px}
.missing-summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.summary-chip{padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.06);font-size:11px;color:#94a3b8}
.summary-chip.late{color:#fbbf24;background:rgba(245,158,11,.12)}
.summary-chip.leave{color:#c4b5fd;background:rgba(139,92,246,.12)}
.missing-group{margin-bottom:12px;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.025)}
.missing-group-title{padding:10px 12px;background:rgba(59,130,246,.1);font-size:13px;font-weight:700;color:#bfdbfe}
.missing-group-title span{float:right;color:#64748b;font-size:11px;font-weight:400}
.missing-person{padding:11px 12px;border-top:1px solid rgba(255,255,255,.05)}
.missing-person:first-child{border-top:none}
.person-line{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.person-name{font-size:14px;font-weight:600;color:#e2e8f0}
.status-badge{padding:2px 7px;border-radius:999px;font-size:10px;color:#94a3b8;background:rgba(148,163,184,.12)}
.status-badge.late{color:#fbbf24;background:rgba(245,158,11,.14)}
.status-badge.leave{color:#c4b5fd;background:rgba(139,92,246,.14)}
.person-meta{font-size:11px;color:#64748b;line-height:1.6;margin-top:4px;word-break:break-all}
.phone-link{color:#60a5fa;text-decoration:none;font-variant-numeric:tabular-nums}
.status-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.mini-btn{padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#94a3b8;font-size:11px;cursor:pointer}
.mini-btn.late{color:#fbbf24;border-color:rgba(245,158,11,.25)}
.mini-btn.leave{color:#c4b5fd;border-color:rgba(139,92,246,.25)}
.mini-btn.delete{color:#f87171;border-color:rgba(239,68,68,.3);margin-left:auto}
.mini-btn.active{background:rgba(59,130,246,.18);color:#fff;border-color:#3b82f6}
.group-bars{margin-bottom:12px}
.group-row{display:flex;align-items:center;padding:6px 0;font-size:13px}
.group-row .g-name{width:80px;text-align:right;margin-right:10px;color:#94a3b8;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.group-row .g-bar{flex:1;height:22px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;position:relative}
.group-row .g-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:4px;transition:width .5s}
.group-row .g-bar-txt{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#fff;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.group-row .g-num{width:80px;margin-left:8px;font-size:12px;color:#94a3b8;flex-shrink:0}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.toggle-row .t-label{font-size:14px;color:#e2e8f0}
.toggle-row .t-desc{font-size:11px;color:#64748b;margin-top:2px}
.switch{position:relative;display:inline-block;width:48px;height:28px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.15);transition:.3s;border-radius:28px}
.slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:white;transition:.3s;border-radius:50%}
input:checked+.slider{background:#3b82f6}
input:checked+.slider:before{transform:translateX(20px)}
.col-map{font-size:12px;color:#64748b;margin-top:8px;line-height:1.8}
.col-map span{color:#94a3b8}
.col-map .ok{color:#4ade80}
.col-map .warn{color:#fbbf24}
.footer{text-align:center;padding:20px;font-size:12px;color:#475569}
.footer a{color:#64748b;text-decoration:none}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}.overview{gap:6px}.ov-item{padding:12px 5px}.ov-item .num{font-size:26px}}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>&#x1f4ca; <span id="eventTitle">管理后台</span></h1><div class="sub" id="lastUpdate"></div></div>
  <div class="login-card" id="loginCard">
    <div style="font-size:40px;margin-bottom:12px">&#x1f512;</div>
    <h3 style="margin-bottom:16px">管理员登录</h3>
    <input type="password" id="pwdInput" placeholder="请输入管理密码" autocomplete="off">
    <button class="btn primary full" onclick="doLogin()">登录</button>
    <div class="msg" id="loginMsg"></div>
  </div>
  <div id="mainPanel" style="display:none">
    <div class="section" style="background:rgba(255,255,255,.04);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.06)">
      <h3>📅 当前管理活动</h3>
      <div class="form-grid">
        <div class="form-field"><label for="eventSelect">选择活动</label><select id="eventSelect" onchange="selectAdminEvent()"></select></div>
        <div class="form-field"><label>活动状态</label><button class="btn" id="eventStatusBtn" onclick="toggleEventStatus()">切换状态</button></div>
      </div>
      <div class="form-help" id="eventMeta"></div>
    </div>
    <div class="overview" id="overview"></div>

    <div class="section" style="background:rgba(255,255,255,.04);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.06)">
      <h3>&#x2699;&#xfe0f; 签到页显示设置</h3>
      <div class="toggle-row">
        <div><div class="t-label">显示组别</div><div class="t-desc">签到完成后显示"大会现场：第X组"</div></div>
        <label class="switch"><input type="checkbox" id="toggleGroup" onchange="saveToggle()"><span class="slider"></span></label>
      </div>
      <div class="toggle-row" style="border-bottom:none">
        <div><div class="t-label">显示空巴桌号</div><div class="t-desc">签到完成后显示"空巴晚宴：第X桌"</div></div>
        <label class="switch"><input type="checkbox" id="toggleDinner" onchange="saveToggle()"><span class="slider"></span></label>
      </div>
      <div class="msg" id="toggleMsg"></div>
    </div>

    <div class="section" style="background:rgba(255,255,255,.04);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.06)">
      <h3>&#x2795; 新增临时报名</h3>
      <div class="form-grid">
        <div class="form-field"><label for="manualName">姓名 <span>（必填）</span></label><input id="manualName" type="text" maxlength="50" placeholder="学长姓名"></div>
        <div class="form-field"><label for="manualPhone">手机号 <span>（必填）</span></label><input id="manualPhone" type="tel" inputmode="numeric" maxlength="11" placeholder="11位手机号"></div>
        <div class="form-field"><label for="manualCenter">分中心</label><input id="manualCenter" type="text" maxlength="50" list="centerOptions" placeholder="园区/园区分中心均可"></div>
        <div class="form-field"><label for="manualClass">班级</label><input id="manualClass" type="text" maxlength="50" placeholder="如：广东一班"></div>
        <div class="form-field"><label for="manualGroup">小组</label><input id="manualGroup" type="text" maxlength="50" placeholder="如：第一组"></div>
        <div class="form-field"><label for="manualCompany">公司 <span>（选填）</span></label><input id="manualCompany" type="text" maxlength="100" placeholder="公司名称"></div>
      </div>
      <datalist id="centerOptions"><option value="园区分中心"><option value="姑苏相城分中心"><option value="吴江分中心"><option value="昆山分中心"><option value="新吴分中心"><option value="张家港分中心"></datalist>
      <div class="form-help">分中心支持模糊识别并统一为六个标准名称，例如“园区”会自动归为“园区分中心”；未识别内容进入未分组。</div>
      <button class="btn primary full" id="manualAddBtn" onclick="addManualRegistration()">确认新增报名</button>
      <div class="msg" id="manualAddMsg"></div>
    </div>

    <div class="section">
      <h3>&#x1f4e4; 新增活动（上传 Excel 报名表）</h3>
      <div class="form-field">
        <label for="eventNameInput">活动名称 <span>（选填，留空则读取上传文件名）</span></label>
        <input id="eventNameInput" type="text" maxlength="100" placeholder="留空则自动读取文件名，并去掉 .xls / .xlsx 等后缀" oninput="scheduleUploadPreview()">
      </div>
      <div class="form-grid">
        <div class="form-field"><label for="eventDateInput">活动日期 <span>（必填）</span></label><input id="eventDateInput" type="date" onchange="syncDefaultCheckinTimes();scheduleUploadPreview()"></div>
        <div class="form-field"><label for="activityTypeInput">活动类型 <span>（必填）</span></label><select id="activityTypeInput" onchange="scheduleUploadPreview()"><option value="course">课程</option><option value="class_meeting">班会/班级学习会</option><option value="group_meeting">小组学习会</option><option value="national_report">全国报告会</option><option value="center_quarterly_report">分中心季度报告会</option><option value="staff_training">班主任辅导员培训会</option><option value="board_meeting">理事会</option><option value="study_tour">游学</option><option value="other">其他</option></select></div>
        <div class="form-field"><label for="checkinStartInput">签到开始时间 <span>（必填）</span></label><input id="checkinStartInput" type="datetime-local" onchange="scheduleUploadPreview()"></div>
        <div class="form-field"><label for="checkinEndInput">签到截止时间 <span>（必填）</span></label><input id="checkinEndInput" type="datetime-local" onchange="scheduleUploadPreview()"></div>
      </div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="icon">&#x1f4c1;</div>
        <div class="text" id="uploadText">点击上传 Excel 报名表</div>
        <div class="hint">支持 .xls / .xlsx；自动查找前100行表头，列顺序不限</div>
      </div>
      <input type="file" id="fileInput" accept=".xls,.xlsx" style="display:none" onchange="handleFile(event)">
      <div id="colMapInfo" class="col-map" style="display:none"></div>
      <div id="uploadPreview" class="upload-preview"></div>
      <button class="btn primary full" id="upBtn" onclick="uploadData()" style="display:none">确认新增活动并导入</button>
      <div class="msg" id="uploadMsg"></div>
    </div>

    <!-- Export button -->
    <div class="section">
      <button class="btn success full" onclick="exportExcel()">&#x1f4e5; 导出签到名单（Excel）</button>
      <div class="msg" id="exportMsg"></div>
    </div>

    <div class="tabs" id="tabBar">
      <button class="tab active" onclick="switchTab('groups')">分组进展</button>
      <button class="tab" onclick="switchTab('missing')">未签到</button>
      <button class="tab" onclick="switchTab('recent')">已签到</button>
    </div>
    <div id="tabContent"></div>
    <div class="btn-group">
      <button class="btn danger" onclick="resetCheckins()">&#x1f504; 清空签到</button>
      <button class="btn danger" onclick="clearAll()">&#x1f5d1; 删除当前活动全部数据</button>
    </div>
    <div class="msg" id="clearMsg"></div>
  </div>
  <div class="footer"><a href="index.html">&larr; 返回签到页</a></div>
</div>
<script>
var API = "https://shengheshu-d2g2zyyl99f6c6fc2-1453587887.ap-shanghai.app.tcloudbase.com/api";
var adminToken = "", refreshTimer = null;
var currentTab = "groups", currentData = null, currentEvents = [], currentEventId = "", excelData = null, uploadGroupField = "", uploadPreview = null, uploadPreviewTimer = null;
document.getElementById("eventDateInput").value = new Date().toLocaleDateString("en-CA", {timeZone:"Asia/Shanghai"});
syncDefaultCheckinTimes();

function authHeaders(json) {
  var headers = {"Authorization":"Bearer "+adminToken};
  if (json) headers["Content-Type"] = "application/json";
  return headers;
}

function esc(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g,function(ch){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
  });
}

async function adminFetch(path, options) {
  options = options || {};
  options.headers = Object.assign({}, options.headers || {}, authHeaders(!!options.body));
  var response = await fetch(API + path, options);
  if (response.status === 401) {
    adminToken = "";
    if (refreshTimer) clearInterval(refreshTimer);
    document.getElementById("mainPanel").style.display="none";
    document.getElementById("loginCard").style.display="block";
    throw new Error("登录已失效，请重新登录");
  }
  return response;
}

async function doLogin() {
  var p = document.getElementById("pwdInput").value.trim();
  var m = document.getElementById("loginMsg");
  if (!p) { showMsg(m,"请输入管理密码","error"); return; }
  try {
    var response = await fetch(API + "/admin_login", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:p})});
    var result = await response.json();
    document.getElementById("pwdInput").value = "";
    if (!result.ok || !result.token) { showMsg(m,result.msg||"登录失败","error"); return; }
    adminToken = result.token;
    document.getElementById("loginCard").style.display="none";
    document.getElementById("mainPanel").style.display="block";
    await loadData();
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(loadData, 5000);
  } catch (e) { showMsg(m,"登录失败："+e.message,"error"); }
}

async function loadData() {
  try {
    var er = await adminFetch("/admin_events");
    var ed = await er.json();
    if (!ed.ok) throw new Error(ed.msg || "活动列表加载失败");
    currentEvents = ed.events || [];
    if (!currentEventId || !currentEvents.some(function(item){return item.event_id===currentEventId;})) currentEventId = ed.selected_event_id || (currentEvents[0] && currentEvents[0].event_id) || "";
    renderEventSelector();
    if (!currentEventId) { document.getElementById("eventTitle").textContent="请先新增活动"; return; }
    var r = await adminFetch("/stats?event_id="+encodeURIComponent(currentEventId));
    currentData = await r.json();
    document.getElementById("eventTitle").textContent = currentData.event_name || "管理后台";
    document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
    document.getElementById("overview").innerHTML =
      '<div class="ov-item"><div class="num green">'+currentData.checked+'</div><div class="label">已签到</div></div>'+
      '<div class="ov-item"><div class="num blue">'+currentData.total+'</div><div class="label">报名总数</div></div>'+
      '<div class="ov-item"><div class="num yellow">'+currentData.rate+'%</div><div class="label">签到率</div></div>';
    document.getElementById("toggleGroup").checked = currentData.show_group !== "false";
    document.getElementById("toggleDinner").checked = currentData.show_dinner_table !== "false";
    var gt = currentData.group_type || "分中心";
    var tabs = document.querySelectorAll("#tabBar .tab");
    if (tabs.length > 0) tabs[0].textContent = gt;
    renderTab();
  } catch(e) { document.getElementById("lastUpdate").textContent = e.message || "加载失败"; }
}

function renderEventSelector() {
  var select=document.getElementById("eventSelect");
  select.innerHTML=currentEvents.map(function(item){return '<option value="'+esc(item.event_id)+'"'+(item.event_id===currentEventId?' selected':'')+'>'+esc(item.event_date+' · '+item.name)+'</option>';}).join("");
  var item=currentEvents.find(function(row){return row.event_id===currentEventId;});
  var stateNames={open:"签到中",upcoming:"未开始",ended:"已结束",closed:"已手动关闭"};
  document.getElementById("eventMeta").textContent=item ? item.event_date+" · "+item.activity_type_name+" · "+(stateNames[item.checkin_status]||"")+" · "+item.total+"人报名 · "+item.checked+"人签到" : "暂无活动";
  var btn=document.getElementById("eventStatusBtn");
  btn.textContent=item && item.manual_status==="active" ? "手动关闭签到" : "恢复按时间开放";
  document.getElementById("manualAddBtn").disabled=!item || item.checkin_status!=="open";
}

async function selectAdminEvent(){
  currentEventId=document.getElementById("eventSelect").value;
  await adminFetch("/event_update",{method:"POST",body:JSON.stringify({event_id:currentEventId,select:true})});
  await loadData();
}

async function toggleEventStatus(){
  var item=currentEvents.find(function(row){return row.event_id===currentEventId;}); if(!item)return;
  var next=item.manual_status==="active"?"closed":"active";
  if(!confirm(next==="closed"?"关闭后，该活动将不能继续签到，确定关闭吗？":"确定重新开放该活动签到吗？"))return;
  await adminFetch("/event_update",{method:"POST",body:JSON.stringify({event_id:currentEventId,status:next})});
  await loadData();
}

async function saveToggle() {
  var grp = document.getElementById("toggleGroup").checked;
  var din = document.getElementById("toggleDinner").checked;
  try {
    var r = await adminFetch("/settings", {
      method:"POST",
      body: JSON.stringify({show_group:grp, show_dinner_table:din})
    });
    var d = await r.json();
    if(d.ok) showMsg(document.getElementById("toggleMsg"), "设置已保存", "success");
  } catch(e) {}
}

async function addManualRegistration() {
  var btn = document.getElementById("manualAddBtn");
  var msg = document.getElementById("manualAddMsg");
  var payload = {
    event_id: currentEventId,
    name: document.getElementById("manualName").value.trim(),
    phone: document.getElementById("manualPhone").value.trim(),
    center: document.getElementById("manualCenter").value.trim(),
    class_name: document.getElementById("manualClass").value.trim(),
    group_name: document.getElementById("manualGroup").value.trim(),
    company: document.getElementById("manualCompany").value.trim()
  };
  if (!payload.event_id) { showMsg(msg, "请先选择当前管理活动", "error"); return; }
  var currentEvent=currentEvents.find(function(row){return row.event_id===currentEventId;});
  if (!currentEvent || currentEvent.checkin_status!=="open") { showMsg(msg, "当前管理活动不在签到时间内，不能新增临时报名", "error"); return; }
  if (!payload.name) { showMsg(msg, "请输入姓名", "error"); return; }
  if (!/^\d{11}$/.test(payload.phone)) { showMsg(msg, "请输入正确的11位手机号", "error"); return; }
  btn.disabled = true; btn.textContent = "新增中...";
  try {
    var r = await adminFetch("/registration", {method:"POST",body:JSON.stringify(payload)});
    var d = await r.json();
    if (!d.ok) { showMsg(msg, d.msg || "新增失败", "error"); return; }
    ["manualName","manualPhone","manualCenter","manualClass","manualGroup","manualCompany"].forEach(function(id){document.getElementById(id).value="";});
    showMsg(msg, d.msg, "success");
    await loadData();
  } catch(e) {
    showMsg(msg, "新增失败："+e.message, "error");
  } finally {
    btn.disabled = false; btn.textContent = "确认新增报名";
  }
}

async function setAttendanceStatus(button) {
  var registrationId = button.getAttribute("data-id") || "";
  var status = button.getAttribute("data-status") || "pending";
  var person = (currentData.not_checked || []).find(function(row){return row.registration_id === registrationId;}) || {};
  var note = "";
  if (status !== "pending") {
    var promptText = status === "late" ? "可填写预计到达时间或备注（选填）" : "可填写请假原因或备注（选填）";
    var input = prompt(promptText, person.attendance_note || "");
    if (input === null) return;
    note = input.trim();
  }
  button.disabled = true;
  try {
    var r = await adminFetch("/attendance_status", {method:"POST",body:JSON.stringify({registration_id:registrationId,status:status,note:note})});
    var d = await r.json();
    if (!d.ok) alert(d.msg || "状态更新失败");
    await loadData();
  } catch(e) {
    alert("状态更新失败："+e.message);
  } finally {
    button.disabled = false;
  }
}

async function deleteRegistration(button) {
  var registrationId = button.getAttribute("data-id") || "";
  var person = (currentData.not_checked || []).find(function(row){return row.registration_id === registrationId;}) || {};
  if (!registrationId) { alert("缺少报名记录标识，请刷新页面后重试"); return; }
  var confirmed = confirm("确定删除这条报名记录吗？\n\n姓名："+(person.name||"")+"\n手机号："+(person.phone||"")+"\n\n删除后，该学长将无法使用这条记录签到。");
  if (!confirmed) return;
  button.disabled = true;
  try {
    var r = await adminFetch("/registration_delete", {method:"POST",body:JSON.stringify({registration_id:registrationId})});
    var d = await r.json();
    if (!d.ok) { alert(d.msg || "删除失败"); return; }
    await loadData();
  } catch(e) {
    alert("删除失败："+e.message);
  } finally {
    button.disabled = false;
  }
}

async function exportExcel() {
  var btn = event.target, msg = document.getElementById("exportMsg");
  btn.disabled = true; btn.textContent = "导出中...";
  try {
    var r = await adminFetch("/export", {
      method:"POST",
      body: JSON.stringify({event_id:currentEventId})
    });
    var d = await r.json();
    if (!d.ok) { showMsg(msg, d.msg, "error"); btn.disabled = false; btn.textContent = "导出签到名单（Excel）"; return; }
    
    // Build Excel using SheetJS
    var rows = d.rows || [];
    var headers = ["序号","姓名","手机号","公司","分中心","班级","小组","组号","桌号","签到状态","签到时间","跟进备注"];
    var data = [];
    rows.forEach(function(row, idx) {
      data.push([
        idx + 1,
        row.name,
        row.phone,
        row.company,
        row.center,
        row.class_name,
        row.group_name,
        row.group_num,
        row.dinner_table_num,
        row.sign_status,
        row.sign_time,
        row.attendance_note || ""
      ]);
    });
    var ws = XLSX.utils.aoa_to_sheet([headers].concat(data));
    // Set column widths
    ws["!cols"] = [
      {wch:6},{wch:10},{wch:15},{wch:18},{wch:14},{wch:12},{wch:10},{wch:6},{wch:6},{wch:10},{wch:20},{wch:24}
    ];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "签到名单");
    var evName = currentData ? (currentData.event_name || "签到名单") : "签到名单";
    var now = new Date();
    var fn = evName + "_" + now.getFullYear() + ("0"+(now.getMonth()+1)).slice(-2) + ("0"+now.getDate()).slice(-2) + "_" + ("0"+now.getHours()).slice(-2) + ("0"+now.getMinutes()).slice(-2) + ".xlsx";
    XLSX.writeFile(wb, fn);
    showMsg(msg, "导出成功："+rows.length+" 条记录", "success");
  } catch(e) { showMsg(msg, "导出失败："+e.message, "error"); }
  btn.disabled = false; btn.textContent = "导出签到名单（Excel）";
}

function renderTab() {
  if (!currentData) return;
  var h = "";
  if (currentTab === "groups") {
    var gt = currentData.group_type || "分中心";
    h = '<div class="section"><h3>&#x1f3e2; '+gt+'签到进展</h3><div class="group-bars">';
    var groups = currentData.groups || {};
    var keys = Object.keys(groups).sort(function(a,b){return groups[b].total - groups[a].total;});
    keys.forEach(function(c) {
      var d = groups[c], pct = d.total > 0 ? Math.round(d.checked / d.total * 100) : 0;
      h += '<div class="group-row"><span class="g-name" title="'+esc(c)+'">'+esc(c)+'</span>'+
        '<div class="g-bar"><div class="g-fill" style="width:'+pct+'%"></div>'+
        '<div class="g-bar-txt">'+pct+'%</div></div>'+
        '<span class="g-num">'+d.checked+'/'+d.total+'</span></div>';
    });
    h += '</div></div>';
  } else if (currentTab === "missing") {
    var groupField = currentData.group_field || ({"分中心":"center","班级":"class_name","小组":"group_name"}[currentData.group_type] || "center");
    var groupLabel = currentData.group_type || "分组";
    var missing = currentData.not_checked || [];
    var grouped = {};
    missing.forEach(function(n) {
      var key = String(n[groupField] || "").trim() || "未分组";
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(n);
    });
    h = '<div class="section"><h3>&#x26a0; 未签到 ('+missing.length+'人) · 按'+esc(groupLabel)+'分类</h3>'+
      '<div class="missing-summary">'+
        '<span class="summary-chip">待确认 '+Number(currentData.pending||0)+'</span>'+
        '<span class="summary-chip late">迟到 '+Number(currentData.late||0)+'</span>'+
        '<span class="summary-chip leave">请假 '+Number(currentData.leave||0)+'</span>'+
      '</div>';
    var groupKeys = Object.keys(grouped).sort(function(a,b) {
      if (a === "未分组") return 1;
      if (b === "未分组") return -1;
      return a.localeCompare(b, "zh-CN");
    });
    groupKeys.forEach(function(key) {
      var people = grouped[key].slice().sort(function(a,b) {
        var order = {pending:0,late:1,leave:2};
        return (order[a.attendance_status]||0) - (order[b.attendance_status]||0) || String(a.name||"").localeCompare(String(b.name||""), "zh-CN");
      });
      h += '<div class="missing-group"><div class="missing-group-title">'+esc(key)+'<span>'+people.length+'人</span></div>';
      people.forEach(function(n) {
        var status = n.attendance_status || "pending";
        var meta = [];
        if (groupField !== "center" && n.center) meta.push("分中心："+n.center);
        if (groupField !== "class_name" && n.class_name) meta.push("班级："+n.class_name);
        if (groupField !== "group_name" && n.group_name) meta.push("小组："+n.group_name);
        if (n.company) meta.push(n.company);
        if (n.attendance_note) meta.push("备注："+n.attendance_note);
        h += '<div class="missing-person">'+
          '<div class="person-line"><span class="person-name">'+esc(n.name)+'</span><span class="status-badge '+esc(status)+'">'+esc(n.attendance_status_label||"未签到")+'</span><a class="phone-link" href="tel:'+esc(n.phone)+'">'+esc(n.phone||"无手机号")+'</a></div>'+
          (meta.length ? '<div class="person-meta">'+esc(meta.join(" · "))+'</div>' : '')+
          '<div class="status-actions">'+
            '<button class="mini-btn '+(status==="pending"?'active':'')+'" data-id="'+esc(n.registration_id)+'" data-status="pending" onclick="setAttendanceStatus(this)">未签到</button>'+
            '<button class="mini-btn late '+(status==="late"?'active':'')+'" data-id="'+esc(n.registration_id)+'" data-status="late" onclick="setAttendanceStatus(this)">迟到</button>'+
            '<button class="mini-btn leave '+(status==="leave"?'active':'')+'" data-id="'+esc(n.registration_id)+'" data-status="leave" onclick="setAttendanceStatus(this)">请假</button>'+
            '<button class="mini-btn delete" data-id="'+esc(n.registration_id)+'" onclick="deleteRegistration(this)">删除报名</button>'+
          '</div></div>';
      });
      h += '</div>';
    });
    h += '</div>';
  } else if (currentTab === "recent") {
    h = '<div class="section"><h3>&#x2705; 最近签到</h3>';
    currentData.recent.forEach(function(r) {
      var extra="";
      if(r.group_num) extra+=" · 组"+r.group_num;
      if(r.dinner_table_num) extra+=" · 桌"+r.dinner_table_num;
      h += '<div class="list-item"><div><span class="li-name">'+esc(r.name)+'</span><span class="li-meta">'+extra+' · '+esc(r.center||r.class_name||r.group_name||"")+'</span></div><span class="li-meta">'+esc(r.checked_at||"")+'</span></div>';
    });
  }
  document.getElementById("tabContent").innerHTML = h || '<div style="text-align:center;padding:40px;color:#64748b">暂无数据</div>';
}

function switchTab(t) {
  currentTab = t;
  var tabs = document.querySelectorAll("#tabBar .tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  event.target.classList.add("active");
  renderTab();
}

function detectColumns(headers) {
  var map = { name:-1, phone:-1, company:-1, center:-1, class_name:-1, group_name:-1, group_num:-1, dinner_table_num:-1, is_student:-1 };
  function normalizeHeader(h) {
    return String(h||"").trim().toLowerCase()
      .replace(/[（(][^）)]*[）)]/g, "")
      .replace(/[\s*＊:：_\-/]+/g, "");
  }
  function match(h) {
    h = normalizeHeader(h);
    if (/^(姓名|名字|name|学员姓名|参会人|参会人姓名|报名人|报名人姓名|嘉宾姓名)$/i.test(h)) return "name";
    if (/^(手机号|手机号码|电话|phone|tel|mobile|联系电话|联系手机|报名手机)$/i.test(h)) return "phone";
    if (/^(公司|企业|单位|company|公司名称|工作单位)$/i.test(h)) return "company";
    if (/^(分中心|中心|center|分部|所属分中心)$/i.test(h)) return "center";
    if (/^(班级|班|class|班级名称)$/i.test(h)) return "class_name";
    if (/^(组号|组别|大组|分组)$/i.test(h)) return "group_num";
    if (/^(小组|小组名称|组名)$/i.test(h)) return "group_name";
    if (/^(桌号|桌数|桌子|空巴桌号|晚宴桌号|dinner|table)$/i.test(h)) return "dinner_table_num";
    if (/^(是否学员|学员|is_student)$/i.test(h)) return "is_student";
    return null;
  }
  for (var i = 0; i < headers.length; i++) {
    var m = match(headers[i]);
    if (m && map[m] === -1) map[m] = i;
  }
  return map;
}

function findHeaderRow(rows) {
  var best = null;
  var scanLimit = Math.min(100, rows.length);
  for (var i = 0; i < scanLimit; i++) {
    if (!Array.isArray(rows[i])) continue;
    var columns = detectColumns(rows[i]);
    if (columns.name < 0 || columns.phone < 0) continue;
    var recognized = Object.keys(columns).filter(function(key){return columns[key] >= 0;}).length;
    if (!best || recognized > best.recognized) {
      best = { rowIndex:i, columns:columns, recognized:recognized };
    }
  }
  return best;
}

function handleFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  var nameInput = document.getElementById("eventNameInput");
  if (nameInput && !nameInput.value.trim()) nameInput.placeholder = "默认活动名称："+stripSpreadsheetExtension(file.name);
  uploadPreview = null;
  document.getElementById("uploadPreview").className = "upload-preview";
  document.getElementById("uploadPreview").innerHTML = "";
  document.getElementById("upBtn").style.display = "none";
  document.getElementById("uploadArea").innerHTML = '<div class="icon">&#x2705;</div><div class="text">已选择：'+esc(file.name)+'</div><div class="hint">点击重新选择</div>';
  var reader = new FileReader();
  reader.onload = async function(evt) {
    try {
      var wb = XLSX.read(evt.target.result, {type:"array"});
      var arr = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:""});
      
      var header = findHeaderRow(arr);
      if (!header) throw new Error("前100行未找到同时包含“姓名”和“手机号”的表头，请检查列名");
      var headerRow = header.rowIndex;
      var dataStart = headerRow + 1;
      var col = header.columns;
      uploadGroupField = col.center >= 0 ? "center" :
        (col.class_name >= 0 ? "class_name" : (col.group_name >= 0 ? "group_name" : ""));
      
      var mapHtml = "自动识别表头：第"+(headerRow+1)+"行<br>列识别：";
      function colStatus(key, label) {
        var idx = col[key];
        if (idx >= 0) return '<span class="ok">'+label+'=第'+(idx+1)+'列</span>';
        return '<span class="warn">'+label+'=未识别</span>';
      }
      mapHtml += colStatus("name","姓名") + "　";
      mapHtml += colStatus("phone","手机号") + "<br>";
      mapHtml += colStatus("company","公司") + "　";
      mapHtml += colStatus("center","分中心") + "　";
      mapHtml += colStatus("class_name","班级") + "　";
      mapHtml += colStatus("group_name","小组") + "<br>";
      mapHtml += colStatus("group_num","组号") + "　";
      mapHtml += colStatus("dinner_table_num","桌号");
      document.getElementById("colMapInfo").innerHTML = mapHtml;
      document.getElementById("colMapInfo").style.display = "block";
      
      excelData = [];
      for (var i = dataStart; i < arr.length; i++) {
        var row = arr[i]; if (!row) continue;
        var nameIdx = col.name, phoneIdx = col.phone;
        if (nameIdx < 0 || phoneIdx < 0) break;
        var n = String(row[nameIdx]||"").trim();
        if (!n || n === "undefined" || n === "nan") continue;
        var ph = String(row[phoneIdx]||"").trim();
        ph = ph.replace(/\s/g,"").replace(/-/g,"");
        if (ph.indexOf(".") >= 0) {
          var num = parseFloat(ph);
          if (!isNaN(num)) ph = String(Math.round(num));
        }
        if (ph.length < 11 && /^\d+$/.test(ph)) ph = ph.padStart(11, "0");
        
        function cell(idx) { return idx >= 0 && row[idx] ? String(row[idx]).trim() : ""; }
        function cellClean(idx) { var v = cell(idx); return (v && v !== "nan" && v !== "undefined") ? v : ""; }
        
        var gn = col.group_num >= 0 ? parseInt(cell(col.group_num)) : null;
        var dn = col.dinner_table_num >= 0 ? parseInt(cell(col.dinner_table_num)) : null;
        if (isNaN(gn)) gn = null;
        if (isNaN(dn)) dn = null;
        
        excelData.push({
          name: n, phone: ph,
          center: cellClean(col.center),
          class_name: cellClean(col.class_name),
          group_name: cellClean(col.group_name),
          company: cellClean(col.company),
          group_num: gn,
          dinner_table_num: dn
        });
      }
      showMsg(document.getElementById("uploadMsg"), "已解析 "+excelData.length+" 条记录，正在核对名单变化...", "info");
      await loadUploadPreview();
    } catch(ex) { showMsg(document.getElementById("uploadMsg"), "解析失败："+ex.message, "error"); }
  };
  reader.readAsArrayBuffer(file);
}

function stripSpreadsheetExtension(name) {
  return String(name || "").trim().replace(/\.(xlsx|xls|xlsm|xlsb|csv)$/i, "").trim();
}

function getUploadEventName() {
  var nameInput = document.getElementById("eventNameInput");
  var manualName = nameInput ? stripSpreadsheetExtension(nameInput.value) : "";
  if (manualName) return manualName;
  var fi = document.getElementById("fileInput");
  return fi && fi.files[0] ? stripSpreadsheetExtension(fi.files[0].name) : "";
}

function getUploadMetadata() {
  return {event_date:document.getElementById("eventDateInput").value, activity_type:document.getElementById("activityTypeInput").value, checkin_start_at:document.getElementById("checkinStartInput").value, checkin_end_at:document.getElementById("checkinEndInput").value};
}

function syncDefaultCheckinTimes() {
  var date=document.getElementById("eventDateInput").value;
  if(!date)return;
  document.getElementById("checkinStartInput").value=date+"T00:00";
  document.getElementById("checkinEndInput").value=date+"T23:59";
}

function scheduleUploadPreview() {
  uploadPreview = null;
  clearTimeout(uploadPreviewTimer);
  document.getElementById("upBtn").style.display = "none";
  document.getElementById("uploadPreview").className = "upload-preview";
  if (!excelData || !excelData.length) return;
  uploadPreviewTimer = setTimeout(function() {
    loadUploadPreview().catch(function(e) {
      showMsg(document.getElementById("uploadMsg"), "活动名称预览失败："+e.message, "error");
    });
  }, 350);
}

async function loadUploadPreview() {
  uploadPreview = null;
  var btn = document.getElementById("upBtn");
  var box = document.getElementById("uploadPreview");
  btn.style.display = "none";
  var r = await adminFetch("/upload_preview", {
    method:"POST",
    body:JSON.stringify(Object.assign({event_name:getUploadEventName(), attendees:excelData, group_field:uploadGroupField},getUploadMetadata()))
  });
  var d = await r.json();
  if (!d.ok) {
    box.className = "upload-preview";
    showMsg(document.getElementById("uploadMsg"), d.msg || "无法生成导入预览", "error");
    return;
  }
  uploadPreview = d;
  var eventHtml = '新活动：'+esc(d.event_date+' · '+d.activity_type_name+' · '+d.new_event_name)+'<br>签到时间：'+esc(new Date(d.checkin_start_at).toLocaleString('zh-CN'))+' 至 '+esc(new Date(d.checkin_end_at).toLocaleString('zh-CN'));
  box.innerHTML = '<div class="preview-title">新增活动核对</div>'+
    '<div class="preview-summary">本次将导入 <strong>'+d.new_total+'</strong> 人</div>'+
    '<div class="preview-events">'+eventHtml+'</div>'+
    '<div class="preview-grid">'+
      '<div class="preview-item"><div class="value">'+d.new_total+'</div><div class="caption">活动报名</div></div>'+
      '<div class="preview-item repeat"><div class="value">'+d.duplicate_groups+'</div><div class="caption">重复报名组</div></div>'+
      '<div class="preview-item repeat"><div class="value">'+d.repeated_slots+'</div><div class="caption">重复额外名额</div></div>'+
    '</div>';
  box.className = "upload-preview show";
  btn.style.display = "block";
  btn.textContent = "确认新增活动并导入";
  showMsg(document.getElementById("uploadMsg"), "请核对以上变化，确认无误后再导入", "info");
}

async function uploadData() {
  if (!excelData || !excelData.length) { showMsg(document.getElementById("uploadMsg"),"请先选择文件","error"); return; }
  if (!uploadPreview) { showMsg(document.getElementById("uploadMsg"),"请先完成名单变更核对","error"); return; }
  var confirmText = "请确认新增活动：\n\n活动："+uploadPreview.new_event_name+
    "\n日期："+uploadPreview.event_date+
    "\n类型："+uploadPreview.activity_type_name+
    "\n签到时间："+new Date(uploadPreview.checkin_start_at).toLocaleString("zh-CN")+" 至 "+new Date(uploadPreview.checkin_end_at).toLocaleString("zh-CN")+
    "\n报名人数："+uploadPreview.new_total+
    "\n重复报名组："+uploadPreview.duplicate_groups+
    "（额外名额 "+uploadPreview.repeated_slots+" 个）";
  if (!confirm(confirmText)) return;
  var btn = document.getElementById("upBtn"), msg = document.getElementById("uploadMsg");
  btn.disabled = true; btn.textContent = "导入中...";
  try {
    var r = await adminFetch("/upload", {
      method:"POST",
      body: JSON.stringify(Object.assign({event_name:getUploadEventName(), attendees:excelData, group_field:uploadGroupField, preview_issued_at:uploadPreview.preview_issued_at, preview_token:uploadPreview.preview_token},getUploadMetadata()))
    });
    var d = await r.json();
    if (d.ok) {
      showMsg(msg, d.msg, "success");
      document.getElementById("uploadArea").innerHTML = '<div class="icon">&#x1f4c1;</div><div class="text">点击上传 Excel 报名表</div><div class="hint">支持 .xls / .xlsx；自动查找前100行表头，列顺序不限</div>';
      document.getElementById("colMapInfo").style.display = "none";
      document.getElementById("uploadPreview").className = "upload-preview";
      document.getElementById("uploadPreview").innerHTML = "";
      document.getElementById("upBtn").style.display = "none"; excelData = null; uploadGroupField = ""; uploadPreview = null;
      document.getElementById("fileInput").value = "";
      document.getElementById("eventNameInput").value = "";
      document.getElementById("eventNameInput").placeholder = "留空则自动读取文件名，并去掉 .xls / .xlsx 等后缀";
      loadData();
    } else {
      if (d.needs_preview) {
        await loadUploadPreview();
        showMsg(msg, "名单核对信息已刷新，请再次确认后导入", "info");
      } else {
        showMsg(msg, d.msg, "error");
      }
    }
  } catch(e) { showMsg(msg, "网络错误："+e.message, "error"); }
  btn.disabled = false; btn.textContent = "确认新增活动并导入";
}

function showMsg(el, text, type) {
  el.textContent = text; el.className = "msg show " + (type || "");
  if (type) setTimeout(function() { el.classList.remove("show"); }, 4000);
}

async function resetCheckins() {
  if (!confirm("确定清空当前活动的签到记录？")) return;
  var msg = document.getElementById("clearMsg");
  try {
    var r = await adminFetch("/reset", {method:"POST",body:JSON.stringify({event_id:currentEventId})});
    var d = await r.json();
    showMsg(msg, d.msg || (d.ok ? "签到记录已清空" : "清空失败"), d.ok ? "success" : "error");
    if (d.ok) loadData();
  } catch(e) { showMsg(msg, "清空失败："+e.message, "error"); }
}

async function clearAll() {
  var item=currentEvents.find(function(row){return row.event_id===currentEventId;});
  if(!item){showMsg(document.getElementById("clearMsg"),"请先选择当前活动","error");return;}
  if (!confirm("第一次确认：将删除当前活动“"+item.name+"”的全部报名和签到记录。\n\n其他活动不会受到影响。是否继续？")) return;
  if (!confirm("第二次确认：活动“"+item.name+"”及其报名、签到数据删除后不可恢复。\n\n确定永久删除吗？")) return;
  var msg = document.getElementById("clearMsg");
  try {
    var r = await adminFetch("/clear_all", {method:"POST",body:JSON.stringify({event_id:currentEventId})});
    var d = await r.json();
    if(d.ok) currentEventId="";
    showMsg(msg, d.msg || (d.ok ? "当前活动已删除" : "删除失败"), d.ok ? "success" : "error");
    if (d.ok) loadData();
  } catch(e) { showMsg(msg, "清空失败："+e.message, "error"); }
}

document.getElementById("pwdInput").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
</script>
