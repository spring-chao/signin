<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理后台 - 盛和塾签到</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:16px}
.header{text-align:center;padding:20px 0}
.header h1{font-size:18px;margin-bottom:4px}
.header .sub{font-size:12px;color:#64748b}
.login-card{background:rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08);text-align:center}
.login-card input{width:100%;padding:14px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:16px;outline:none;margin-bottom:12px;text-align:center}
.login-card input:focus{border-color:#3b82f6}
.overview{display:flex;gap:10px;margin-bottom:16px}
.ov-item{flex:1;text-align:center;background:rgba(255,255,255,.05);border-radius:12px;padding:16px 8px}
.ov-item .num{font-size:32px;font-weight:800}
.ov-item .num.green{color:#4ade80}.ov-item .num.blue{color:#60a5fa}.ov-item .num.yellow{color:#fbbf24}
.ov-item .label{font-size:11px;color:#64748b;margin-top:4px}
.section{margin-bottom:16px}
.section h3{font-size:14px;margin-bottom:10px;color:#94a3b8}
.upload-area{border:2px dashed rgba(255,255,255,.15);border-radius:12px;padding:20px;text-align:center;margin-bottom:12px;cursor:pointer}
.upload-area:hover{border-color:#3b82f6;background:rgba(59,130,246,.05)}
.upload-area .icon{font-size:32px;margin-bottom:6px}
.upload-area .text{font-size:13px;color:#94a3b8}
.upload-area .hint{font-size:11px;color:#475569;margin-top:4px}
.upload-preview{display:none;margin:0 0 12px;padding:14px;border-radius:12px;background:rgba(15,23,42,.72);border:1px solid rgba(96,165,250,.28)}
.upload-preview.show{display:block}
.upload-preview .preview-title{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:10px}
.preview-events{font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:10px;word-break:break-all}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.preview-item{background:rgba(255,255,255,.05);border-radius:8px;padding:9px 6px;text-align:center}
.preview-item .value{font-size:20px;font-weight:800;color:#e2e8f0}
.preview-item .caption{font-size:11px;color:#64748b;margin-top:2px}
.preview-item.add .value{color:#4ade80}.preview-item.remove .value{color:#f87171}.preview-item.repeat .value{color:#fbbf24}
.preview-warning{margin-top:10px;padding:9px 10px;border-radius:8px;background:rgba(239,68,68,.12);color:#fca5a5;font-size:12px;line-height:1.5}
.btn{padding:10px 24px;border-radius:10px;font-size:14px;cursor:pointer;border:none;font-weight:600;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.btn.success{background:rgba(34,197,94,.25);color:#4ade80}
.btn.danger{background:rgba(239,68,68,.2);color:#f87171}
.btn.full{width:100%;padding:14px;font-size:16px}
.btn-group{display:flex;gap:8px;margin-top:12px}
.btn-group .btn{flex:1;text-align:center}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.msg.show{display:block}
.msg.success{background:rgba(34,197,94,.15);color:#4ade80}
.msg.error{background:rgba(239,68,68,.15);color:#f87171}
.msg.info{background:rgba(59,130,246,.15);color:#60a5fa}
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;background:rgba(255,255,255,.05);color:#94a3b8;border:none;transition:all .2s}
.tab.active{background:#3b82f6;color:#fff}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.list-item .li-name{font-weight:500}
.list-item .li-meta{color:#64748b;font-size:11px}
.group-bars{margin-bottom:12px}
.group-row{display:flex;align-items:center;padding:6px 0;font-size:13px}
.group-row .g-name{width:80px;text-align:right;margin-right:10px;color:#94a3b8;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.group-row .g-bar{flex:1;height:22px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;position:relative}
.group-row .g-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:4px;transition:width .5s}
.group-row .g-bar-txt{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#fff;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.group-row .g-num{width:80px;margin-left:8px;font-size:12px;color:#94a3b8;flex-shrink:0}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.toggle-row .t-label{font-size:14px;color:#e2e8f0}
.toggle-row .t-desc{font-size:11px;color:#64748b;margin-top:2px}
.switch{position:relative;display:inline-block;width:48px;height:28px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.15);transition:.3s;border-radius:28px}
.slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:white;transition:.3s;border-radius:50%}
input:checked+.slider{background:#3b82f6}
input:checked+.slider:before{transform:translateX(20px)}
.col-map{font-size:12px;color:#64748b;margin-top:8px;line-height:1.8}
.col-map span{color:#94a3b8}
.col-map .ok{color:#4ade80}
.col-map .warn{color:#fbbf24}
.footer{text-align:center;padding:20px;font-size:12px;color:#475569}
.footer a{color:#64748b;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>&#x1f4ca; <span id="eventTitle">管理后台</span></h1><div class="sub" id="lastUpdate"></div></div>
  <div class="login-card" id="loginCard">
    <div style="font-size:40px;margin-bottom:12px">&#x1f512;</div>
    <h3 style="margin-bottom:16px">管理员登录</h3>
    <input type="password" id="pwdInput" placeholder="请输入管理密码" autocomplete="off">
    <button class="btn primary full" onclick="doLogin()">登录</button>
    <div class="msg" id="loginMsg"></div>
  </div>
  <div id="mainPanel" style="display:none">
    <div class="overview" id="overview"></div>

    <div class="section" style="background:rgba(255,255,255,.04);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.06)">
      <h3>&#x2699;&#xfe0f; 签到页显示设置</h3>
      <div class="toggle-row">
        <div><div class="t-label">显示组别</div><div class="t-desc">签到完成后显示"大会现场：第X组"</div></div>
        <label class="switch"><input type="checkbox" id="toggleGroup" onchange="saveToggle()"><span class="slider"></span></label>
      </div>
      <div class="toggle-row" style="border-bottom:none">
        <div><div class="t-label">显示空巴桌号</div><div class="t-desc">签到完成后显示"空巴晚宴：第X桌"</div></div>
        <label class="switch"><input type="checkbox" id="toggleDinner" onchange="saveToggle()"><span class="slider"></span></label>
      </div>
      <div class="msg" id="toggleMsg"></div>
    </div>

    <div class="section">
      <h3>&#x1f4e4; 更换活动（上传 Excel 报名表）</h3>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="icon">&#x1f4c1;</div>
        <div class="text" id="uploadText">点击上传 Excel 报名表</div>
        <div class="hint">支持互动吧导出的 .xls / .xlsx（自动识别列名）</div>
      </div>
      <input type="file" id="fileInput" accept=".xls,.xlsx" style="display:none" onchange="handleFile(event)">
      <div id="colMapInfo" class="col-map" style="display:none"></div>
      <div id="uploadPreview" class="upload-preview"></div>
      <button class="btn primary full" id="upBtn" onclick="uploadData()" style="display:none">确认覆盖并导入</button>
      <div class="msg" id="uploadMsg"></div>
    </div>

    <!-- Export button -->
    <div class="section">
      <button class="btn success full" onclick="exportExcel()">&#x1f4e5; 导出签到名单（Excel）</button>
      <div class="msg" id="exportMsg"></div>
    </div>

    <div class="tabs" id="tabBar">
      <button class="tab active" onclick="switchTab('groups')">分组进展</button>
      <button class="tab" onclick="switchTab('missing')">未签到</button>
      <button class="tab" onclick="switchTab('recent')">已签到</button>
    </div>
    <div id="tabContent"></div>
    <div class="btn-group">
      <button class="btn danger" onclick="resetCheckins()">&#x1f504; 清空签到</button>
      <button class="btn danger" onclick="clearAll()">&#x1f5d1; 清空全部</button>
    </div>
  </div>
  <div class="footer"><a href="index.html">&larr; 返回签到页</a></div>
</div>
<script>
var API = "https://shengheshu-d2g2zyyl99f6c6fc2-1453587887.ap-shanghai.app.tcloudbase.com/api";
var adminToken = "", refreshTimer = null;
var currentTab = "groups", currentData = null, excelData = null, uploadGroupField = "", uploadPreview = null;

function authHeaders(json) {
  var headers = {"Authorization":"Bearer "+adminToken};
  if (json) headers["Content-Type"] = "application/json";
  return headers;
}

function esc(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g,function(ch){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
  });
}

async function adminFetch(path, options) {
  options = options || {};
  options.headers = Object.assign({}, options.headers || {}, authHeaders(!!options.body));
  var response = await fetch(API + path, options);
  if (response.status === 401) {
    adminToken = "";
    if (refreshTimer) clearInterval(refreshTimer);
    document.getElementById("mainPanel").style.display="none";
    document.getElementById("loginCard").style.display="block";
    throw new Error("登录已失效，请重新登录");
  }
  return response;
}

async function doLogin() {
  var p = document.getElementById("pwdInput").value.trim();
  var m = document.getElementById("loginMsg");
  if (!p) { showMsg(m,"请输入管理密码","error"); return; }
  try {
    var response = await fetch(API + "/admin_login", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:p})});
    var result = await response.json();
    document.getElementById("pwdInput").value = "";
    if (!result.ok || !result.token) { showMsg(m,result.msg||"登录失败","error"); return; }
    adminToken = result.token;
    document.getElementById("loginCard").style.display="none";
    document.getElementById("mainPanel").style.display="block";
    await loadData();
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(loadData, 5000);
  } catch (e) { showMsg(m,"登录失败："+e.message,"error"); }
}

async function loadData() {
  try {
    var r = await adminFetch("/stats");
    currentData = await r.json();
    document.getElementById("eventTitle").textContent = currentData.event_name || "管理后台";
    document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
    document.getElementById("overview").innerHTML =
      '<div class="ov-item"><div class="num green">'+currentData.checked+'</div><div class="label">已签到</div></div>'+
      '<div class="ov-item"><div class="num blue">'+currentData.total+'</div><div class="label">报名总数</div></div>'+
      '<div class="ov-item"><div class="num yellow">'+currentData.rate+'%</div><div class="label">签到率</div></div>';
    document.getElementById("toggleGroup").checked = currentData.show_group !== "false";
    document.getElementById("toggleDinner").checked = currentData.show_dinner_table !== "false";
    var gt = currentData.group_type || "分中心";
    var tabs = document.querySelectorAll("#tabBar .tab");
    if (tabs.length > 0) tabs[0].textContent = gt;
    renderTab();
  } catch(e) { document.getElementById("lastUpdate").textContent = e.message || "加载失败"; }
}

async function saveToggle() {
  var grp = document.getElementById("toggleGroup").checked;
  var din = document.getElementById("toggleDinner").checked;
  try {
    var r = await adminFetch("/settings", {
      method:"POST",
      body: JSON.stringify({show_group:grp, show_dinner_table:din})
    });
    var d = await r.json();
    if(d.ok) showMsg(document.getElementById("toggleMsg"), "设置已保存", "success");
  } catch(e) {}
}

async function exportExcel() {
  var btn = event.target, msg = document.getElementById("exportMsg");
  btn.disabled = true; btn.textContent = "导出中...";
  try {
    var r = await adminFetch("/export", {
      method:"POST",
      body: JSON.stringify({})
    });
    var d = await r.json();
    if (!d.ok) { showMsg(msg, d.msg, "error"); btn.disabled = false; btn.textContent = "导出签到名单（Excel）"; return; }
    
    // Build Excel using SheetJS
    var rows = d.rows || [];
    var headers = ["序号","姓名","手机号","公司","分中心","班级","小组","组号","桌号","签到状态","签到时间"];
    var data = [];
    rows.forEach(function(row, idx) {
      data.push([
        idx + 1,
        row.name,
        row.phone,
        row.company,
        row.center,
        row.class_name,
        row.group_name,
        row.group_num,
        row.dinner_table_num,
        row.sign_status,
        row.sign_time
      ]);
    });
    var ws = XLSX.utils.aoa_to_sheet([headers].concat(data));
    // Set column widths
    ws["!cols"] = [
      {wch:6},{wch:10},{wch:15},{wch:18},{wch:14},{wch:12},{wch:10},{wch:6},{wch:6},{wch:10},{wch:20}
    ];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "签到名单");
    var evName = currentData ? (currentData.event_name || "签到名单") : "签到名单";
    var now = new Date();
    var fn = evName + "_" + now.getFullYear() + ("0"+(now.getMonth()+1)).slice(-2) + ("0"+now.getDate()).slice(-2) + "_" + ("0"+now.getHours()).slice(-2) + ("0"+now.getMinutes()).slice(-2) + ".xlsx";
    XLSX.writeFile(wb, fn);
    showMsg(msg, "导出成功："+rows.length+" 条记录", "success");
  } catch(e) { showMsg(msg, "导出失败："+e.message, "error"); }
  btn.disabled = false; btn.textContent = "导出签到名单（Excel）";
}

function renderTab() {
  if (!currentData) return;
  var h = "";
  if (currentTab === "groups") {
    var gt = currentData.group_type || "分中心";
    h = '<div class="section"><h3>&#x1f3e2; '+gt+'签到进展</h3><div class="group-bars">';
    var groups = currentData.groups || {};
    var keys = Object.keys(groups).sort(function(a,b){return groups[b].total - groups[a].total;});
    keys.forEach(function(c) {
      var d = groups[c], pct = d.total > 0 ? Math.round(d.checked / d.total * 100) : 0;
      h += '<div class="group-row"><span class="g-name" title="'+esc(c)+'">'+esc(c)+'</span>'+
        '<div class="g-bar"><div class="g-fill" style="width:'+pct+'%"></div>'+
        '<div class="g-bar-txt">'+pct+'%</div></div>'+
        '<span class="g-num">'+d.checked+'/'+d.total+'</span></div>';
    });
    h += '</div></div>';
  } else if (currentTab === "missing") {
    h = '<div class="section"><h3>&#x26a0; 未签到 ('+currentData.not_checked.length+'人)</h3>';
    currentData.not_checked.forEach(function(n) {
      h += '<div class="list-item"><div><span class="li-name">'+esc(n.name)+'</span><span class="li-meta"> · '+esc(n.center||n.class_name||n.group_name||"")+'</span></div><span class="li-meta">'+esc(n.company||"")+'</span></div>';
    });
  } else if (currentTab === "recent") {
    h = '<div class="section"><h3>&#x2705; 最近签到</h3>';
    currentData.recent.forEach(function(r) {
      var extra="";
      if(r.group_num) extra+=" · 组"+r.group_num;
      if(r.dinner_table_num) extra+=" · 桌"+r.dinner_table_num;
      h += '<div class="list-item"><div><span class="li-name">'+esc(r.name)+'</span><span class="li-meta">'+extra+' · '+esc(r.center||r.class_name||r.group_name||"")+'</span></div><span class="li-meta">'+esc(r.checked_at||"")+'</span></div>';
    });
  }
  document.getElementById("tabContent").innerHTML = h || '<div style="text-align:center;padding:40px;color:#64748b">暂无数据</div>';
}

function switchTab(t) {
  currentTab = t;
  var tabs = document.querySelectorAll("#tabBar .tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  event.target.classList.add("active");
  renderTab();
}

function detectColumns(headers) {
  var map = { name:-1, phone:-1, company:-1, center:-1, class_name:-1, group_name:-1, group_num:-1, dinner_table_num:-1, is_student:-1 };
  function match(h) {
    h = String(h||"").trim().toLowerCase();
    if (/^(姓名|名字|name|学员姓名|参会人)$/i.test(h)) return "name";
    if (/^(手机号|手机号码|电话|phone|tel|mobile|联系电话)$/i.test(h)) return "phone";
    if (/^(公司|企业|单位|company|公司名称|工作单位)$/i.test(h)) return "company";
    if (/^(分中心|中心|center|分部|所属分中心)$/i.test(h)) return "center";
    if (/^(班级|班|class|班级名称)$/i.test(h)) return "class_name";
    if (/^(组号|组别|大组|分组)$/i.test(h)) return "group_num";
    if (/^(小组|小组名称|组名)$/i.test(h)) return "group_name";
    if (/^(桌号|桌数|桌子|空巴桌号|晚宴桌号|dinner|table)$/i.test(h)) return "dinner_table_num";
    if (/^(是否学员|学员|is_student)$/i.test(h)) return "is_student";
    return null;
  }
  for (var i = 0; i < headers.length; i++) {
    var m = match(headers[i]);
    if (m && map[m] === -1) map[m] = i;
  }
  return map;
}

function guessByPosition(headers) {
  return { name:0, phone:1, company:2, center:4, class_name:3, group_name:5, group_num:7, dinner_table_num:8, is_student:6 };
}

function handleFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  uploadPreview = null;
  document.getElementById("uploadPreview").className = "upload-preview";
  document.getElementById("uploadPreview").innerHTML = "";
  document.getElementById("upBtn").style.display = "none";
  document.getElementById("uploadArea").innerHTML = '<div class="icon">&#x2705;</div><div class="text">已选择：'+esc(file.name)+'</div><div class="hint">点击重新选择</div>';
  var reader = new FileReader();
  reader.onload = async function(evt) {
    try {
      var wb = XLSX.read(evt.target.result, {type:"array"});
      var arr = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:""});
      
      var headerRow = 0, dataStart = 1;
      for (var hr = 0; hr < Math.min(5, arr.length); hr++) {
        var row = arr[hr];
        if (!row) continue;
        for (var ci = 0; ci < row.length; ci++) {
          if (/^(姓名|名字|name|学员姓名)$/i.test(String(row[ci]||"").trim())) {
            headerRow = hr; dataStart = hr + 1; break;
          }
        }
        if (dataStart > 1) break;
      }
      if (dataStart === 1) {
        var tryRow = arr[3];
        if (tryRow) {
          for (var ci2 = 0; ci2 < tryRow.length; ci2++) {
            if (/^(姓名|名字|name)/i.test(String(tryRow[ci2]||"").trim())) { headerRow = 3; dataStart = 4; break; }
          }
        }
      }
      
      var headers = headerRow >= 0 && arr[headerRow] ? arr[headerRow] : [];
      var col = detectColumns(headers);
      // 统计维度必须来自真实识别到的表头，不能来自后面的固定位置猜测。
      // 否则“是否学员”等普通列可能被误写成分中心，造成统计标题和分组错误。
      uploadGroupField = col.center >= 0 ? "center" :
        (col.class_name >= 0 ? "class_name" : (col.group_name >= 0 ? "group_name" : ""));
      var fallback = guessByPosition(headers);
      
      var mapHtml = "列识别：";
      function colStatus(key, label, allowGuess) {
        var idx = col[key];
        if (idx >= 0) return '<span class="ok">'+label+'=第'+(idx+1)+'列</span>';
        if (allowGuess) {
          col[key] = fallback[key];
          return '<span class="warn">'+label+'=第'+(fallback[key]+1)+'列(推测)</span>';
        }
        return '<span class="warn">'+label+'=未识别</span>';
      }
      mapHtml += colStatus("name","姓名",true) + "　";
      mapHtml += colStatus("phone","手机号",true) + "<br>";
      mapHtml += colStatus("company","公司",false) + "　";
      mapHtml += colStatus("center","分中心",false) + "　";
      mapHtml += colStatus("class_name","班级",false) + "　";
      mapHtml += colStatus("group_name","小组",false) + "<br>";
      mapHtml += colStatus("group_num","组号",false) + "　";
      mapHtml += colStatus("dinner_table_num","桌号",false);
      document.getElementById("colMapInfo").innerHTML = mapHtml;
      document.getElementById("colMapInfo").style.display = "block";
      
      excelData = [];
      for (var i = dataStart; i < arr.length; i++) {
        var row = arr[i]; if (!row) continue;
        var nameIdx = col.name, phoneIdx = col.phone;
        if (nameIdx < 0 || phoneIdx < 0) break;
        var n = String(row[nameIdx]||"").trim();
        if (!n || n === "undefined" || n === "nan") continue;
        var ph = String(row[phoneIdx]||"").trim();
        ph = ph.replace(/\s/g,"").replace(/-/g,"");
        if (ph.indexOf(".") >= 0) {
          var num = parseFloat(ph);
          if (!isNaN(num)) ph = String(Math.round(num));
        }
        if (ph.length < 11 && /^\d+$/.test(ph)) ph = ph.padStart(11, "0");
        
        function cell(idx) { return idx >= 0 && row[idx] ? String(row[idx]).trim() : ""; }
        function cellClean(idx) { var v = cell(idx); return (v && v !== "nan" && v !== "undefined") ? v : ""; }
        
        var gn = col.group_num >= 0 ? parseInt(cell(col.group_num)) : null;
        var dn = col.dinner_table_num >= 0 ? parseInt(cell(col.dinner_table_num)) : null;
        if (isNaN(gn)) gn = null;
        if (isNaN(dn)) dn = null;
        
        excelData.push({
          name: n, phone: ph,
          center: cellClean(col.center),
          class_name: cellClean(col.class_name),
          group_name: cellClean(col.group_name),
          company: cellClean(col.company),
          group_num: gn,
          dinner_table_num: dn
        });
      }
      showMsg(document.getElementById("uploadMsg"), "已解析 "+excelData.length+" 条记录，正在核对名单变化...", "info");
      await loadUploadPreview();
    } catch(ex) { showMsg(document.getElementById("uploadMsg"), "解析失败："+ex.message, "error"); }
  };
  reader.readAsArrayBuffer(file);
}

function getUploadEventName() {
  var fi = document.getElementById("fileInput");
  return fi && fi.files[0] ? fi.files[0].name.replace(/\.(xls|xlsx)$/i,"") : "";
}

async function loadUploadPreview() {
  uploadPreview = null;
  var btn = document.getElementById("upBtn");
  var box = document.getElementById("uploadPreview");
  btn.style.display = "none";
  var r = await adminFetch("/upload_preview", {
    method:"POST",
    body:JSON.stringify({event_name:getUploadEventName(), attendees:excelData, group_field:uploadGroupField})
  });
  var d = await r.json();
  if (!d.ok) {
    box.className = "upload-preview";
    showMsg(document.getElementById("uploadMsg"), d.msg || "无法生成导入预览", "error");
    return;
  }
  uploadPreview = d;
  var eventHtml = d.event_changed
    ? '活动将从“'+esc(d.old_event_name)+'”更换为“'+esc(d.new_event_name)+'”'
    : '活动：'+esc(d.new_event_name);
  var warning = "";
  if (d.old_checked > 0) {
    warning = '<div class="preview-warning">注意：当前已有 '+d.old_checked+' 个签到名额。覆盖名单后，原签到记录将被清空。</div>';
  }
  box.innerHTML = '<div class="preview-title">覆盖前变更核对</div>'+
    '<div class="preview-events">'+eventHtml+'</div>'+
    '<div class="preview-grid">'+
      '<div class="preview-item"><div class="value">'+d.old_total+'</div><div class="caption">当前报名</div></div>'+
      '<div class="preview-item"><div class="value">'+d.new_total+'</div><div class="caption">新文件报名</div></div>'+
      '<div class="preview-item add"><div class="value">+'+d.added+'</div><div class="caption">新增名额</div></div>'+
      '<div class="preview-item remove"><div class="value">-'+d.removed+'</div><div class="caption">减少名额</div></div>'+
      '<div class="preview-item repeat"><div class="value">'+d.duplicate_groups+'</div><div class="caption">重复报名组</div></div>'+
      '<div class="preview-item repeat"><div class="value">'+d.repeated_slots+'</div><div class="caption">重复额外名额</div></div>'+
    '</div>'+warning;
  box.className = "upload-preview show";
  btn.style.display = "block";
  btn.textContent = "确认覆盖并导入";
  showMsg(document.getElementById("uploadMsg"), "请核对以上变化，确认无误后再导入", "info");
}

async function uploadData() {
  if (!excelData || !excelData.length) { showMsg(document.getElementById("uploadMsg"),"请先选择文件","error"); return; }
  if (!uploadPreview) { showMsg(document.getElementById("uploadMsg"),"请先完成名单变更核对","error"); return; }
  var confirmText = "请再次确认覆盖当前名单：\n\n当前报名："+uploadPreview.old_total+
    "\n新文件报名："+uploadPreview.new_total+
    "\n新增名额："+uploadPreview.added+
    "\n减少名额："+uploadPreview.removed+
    "\n重复报名组："+uploadPreview.duplicate_groups+
    "（额外名额 "+uploadPreview.repeated_slots+" 个）";
  if (uploadPreview.old_checked > 0) confirmText += "\n\n警告：现有 "+uploadPreview.old_checked+" 个签到名额将被清空。";
  if (!confirm(confirmText)) return;
  var btn = document.getElementById("upBtn"), msg = document.getElementById("uploadMsg");
  btn.disabled = true; btn.textContent = "导入中...";
  try {
    var r = await adminFetch("/upload", {
      method:"POST",
      body: JSON.stringify({event_name:getUploadEventName(), attendees:excelData, group_field:uploadGroupField, preview_issued_at:uploadPreview.preview_issued_at, preview_token:uploadPreview.preview_token})
    });
    var d = await r.json();
    if (d.ok) {
      showMsg(msg, d.msg, "success");
      document.getElementById("uploadArea").innerHTML = '<div class="icon">&#x1f4c1;</div><div class="text">点击上传 Excel 报名表</div><div class="hint">支持互动吧导出的 .xls / .xlsx（自动识别列名）</div>';
      document.getElementById("colMapInfo").style.display = "none";
      document.getElementById("uploadPreview").className = "upload-preview";
      document.getElementById("uploadPreview").innerHTML = "";
      document.getElementById("upBtn").style.display = "none"; excelData = null; uploadGroupField = ""; uploadPreview = null;
      document.getElementById("fileInput").value = "";
      loadData();
    } else {
      if (d.needs_preview) {
        await loadUploadPreview();
        showMsg(msg, "名单核对信息已刷新，请再次确认后导入", "info");
      } else {
        showMsg(msg, d.msg, "error");
      }
    }
  } catch(e) { showMsg(msg, "网络错误："+e.message, "error"); }
  btn.disabled = false; btn.textContent = "确认覆盖并导入";
}

function showMsg(el, text, type) {
  el.textContent = text; el.className = "msg show " + (type || "");
  if (type) setTimeout(function() { el.classList.remove("show"); }, 4000);
}

async function resetCheckins() {
  if (!confirm("确定清空所有签到记录？")) return;
  await adminFetch("/reset", {method:"POST",body:JSON.stringify({})});
  loadData();
}

async function clearAll() {
  if (!confirm("确定清空全部数据？此操作不可恢复！")) return;
  await adminFetch("/clear_all", {method:"POST",body:JSON.stringify({})});
  loadData();
}

document.getElementById("pwdInput").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
</script>
